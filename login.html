<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page | Alisetty Supriya</title>

    <link rel="shortcut icon" href="./assets/images/favicon.png">
    <link rel="stylesheet" href="./assets/css/styles.css">
</head>

<body>

<main class="card-container slideUp-animation">

    <!-- IMAGE SIDE -->
    <div class="image-container">
        <h1 class="company">Basket <sup>&trade;</sup></h1>
        <img src="./assets/images/signUp.svg" class="illustration" alt="">
        <p class="quote">Welcome back..! Please login</p>
    </div>

    <!-- LOGIN FORM -->
    <form id="login-form">

        <div class="form-container slideRight-animation">

            <h1 class="form-header">Login</h1>

            <!-- EMAIL -->
            <div class="input-container">
                <input type="email" id="login-mail" required>
                <span>E-mail</span>
                <div class="error"></div>
            </div>

            <!-- PASSWORD -->
            <div class="input-container">
                <input type="password" id="login-password" required>
                <span>Password</span>
                <div class="error"></div>
            </div>

            <!-- BUTTON -->
            <button type="submit" class="submit-btn">Login</button>

            <!-- SUCCESS MESSAGE -->
            <div id="login-success" style="display:none; color:green; font-weight:bold; margin-top:10px;">
                Successfully logged in ✔
            </div>

            <!-- BACK TO SIGNUP -->
            <p class="btm-text">
                Don’t have an account..? 
                <a href="index.html" class="btm-text-highlighted">Sign up</a>
            </p>

        </div>

    </form>

</main>

<!-- LOGIN SCRIPT -->
<script>
const loginForm = document.querySelector('#login-form');
const email = document.querySelector('#login-mail');
const password = document.querySelector('#login-password');
const successMsg = document.querySelector('#login-success');

loginForm.addEventListener('submit', (e) => {
    e.preventDefault();

    if (email.value !== "" && password.value !== "") {
        successMsg.style.display = "block";
        successMsg.style.color = "green";
        successMsg.textContent = "Successfully logged in ✔";

        loginForm.reset();
    } else {
        successMsg.style.display = "block";
        successMsg.style.color = "red";
        successMsg.textContent = "Please fill all fields!";
    }
});
</script>

</body>
</html>
